<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer">
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="stylesheet" href="src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Finder</title>
  </head>
  <body>
    <div id="dynamicBg" class="dynamic-background"></div>

    <header class="navbar">
      <div class="nav-brand">
        <img src="/logo.svg" id="logo-principal" class="logo-principal" alt="Anime Finder Logo">
      </div>

      <nav class="nav-links">
        <button id="btnNormalMode" class="nav-link active">Busca Normal</button>
        <button id="btnAiMode" class="nav-link">Recomendação Inteligente ✨</button>
      </nav>

      <div class="nav-auth">
        <button id="navLoginBtn" class="nav-login-btn">👤 Login</button>
        <div id="userProfile" class="user-profile" style="display: none;">
          <img id="userAvatar" src="" alt="Avatar do Usuário" class="user-avatar">
          <button id="logoutBtn" class="logout-btn">Sair</button>
        </div>
      </div>
    </header>

    <div class="container">
      <main class="main-content">
        
        <div id="home-view">
          
          <section class="search-box" id="normalSearchBox">
            <input type="text" id="searchInput" placeholder="Digite o nome do anime (ex: Naruto, Frieren)...">
            <button id="searchBtn">Buscar</button>
          </section>

          <section class="search-box ai-box" id="aiSearchBox" style="display: none;">
            <textarea id="aiInput" placeholder="Ex: Quero um isekai onde o protagonista reencarna como um monstro..."></textarea>
            <button id="aiBtn">Recomendar</button>
          </section>

          <div id="loader" class="loader" style="display: none;"></div>
          <section id="results" class="results-grid"></section>

          <div id="aiWelcome" style="display: none; text-align: center; margin-top: 4rem;">
            <img src="/frieren-finder.svg" id="frierenImg" alt="IA Pronta para Ajudar">
            <h3 style="color: #fff; margin-top: 1rem; font-size: 1.5rem;">Deixe a magia acontecer!</h3>
            <p style="color: #999;">Descreva o que você quer assistir e a IA fará o resto.</p>
          </div>
        </div>

        <div id="auth-view" style="display: none;">
          <div class="auth-box">
            <h2>Acesse sua Conta</h2>
            <p>Para salvar seus animes favoritos e usar a IA</p>
              
            <input type="email" id="emailInput" placeholder="Seu e-mail">
            <input type="password" id="passwordInput" placeholder="Sua senha">
              
            <div class="auth-buttons">
              <button id="loginBtn" class="primary-btn">Entrar</button>
              <button id="registerBtn" class="secondary-btn">Criar Conta</button>
            </div>
            <p id="authMessage" class="auth-message"></p>
          </div>
        </div>
      </main>

      <footer>
        <p>Desenvolvido por <strong>Patrick Hauck</strong></p>
        <p>Dados fornecidos pela <a href="https://jikan.moe/" target="_blank">Jikan API</a></p>
        <div class="social-links">
          <a href="https://github.com/patrickhauck0/anime-finder" target="_blank">GitHub</a> | 
          <a href="https://www.linkedin.com/in/patrick-hauck-4672a2200/" target="_blank">LinkedIn</a>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
