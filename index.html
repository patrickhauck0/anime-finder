<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="src/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Finder</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🎌 Buscador de Animes</h1>
        <p>Descubra seu próximo Isekai favorito!</p>
      </header>

      <main>
        <section class="search-box">
          <input type="text" id="searchInput" placeholder="Digite o nome do anime (ex: Naruto, Frieren)...">
          <button id="searchBtn">Buscar</button>
        </section>

        <section id="results" class="results-grid"></section>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
