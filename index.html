<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer">
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="stylesheet" href="src/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Finder</title>
  </head>
  <body>
    <div id="dynamicBg" class="dynamic-background"></div>

    <div class="container">
      <header>
        <div class="header-top">
          <img src="/logo.svg" id="logo-principal" class="logo-principal" alt="Anime Finder Logo">
          
          <button id="navLoginBtn" class="nav-login-btn">👤 Login</button>
          
          <div id="userProfile" class="user-profile" style="display: none;">
            <img id="userAvatar" src="" alt="Avatar do Usuário" class="user-avatar">
            <button id="logoutBtn" class="logout-btn">Sair</button>
          </div>
        </div>
      </header>

      <main>
        <div id="home-view">
          <section class="search-box">
            <input type="text" id="searchInput" placeholder="Digite o nome do anime (ex: Naruto, Frieren)...">
            <button id="searchBtn">Buscar</button>
          </section>

          <div id="loader" class="loader" style="display: none;"></div>

          <section id="results" class="results-grid"></section>
        </div>
        <div id="auth-view" style="display: none;">
          <div class="auth-box">
            <h2>Acesse sua Conta</h2>
            <p>Para salvar seus animes favoritos e usar a IA</p>
              
            <input type="email" id="emailInput" placeholder="Seu e-mail">
            <input type="password" id="passwordInput" placeholder="Sua senha">
              
            <div class="auth-buttons">
              <button id="loginBtn" class="primary-btn">Entrar</button>
              <button id="registerBtn" class="secondary-btn">Criar Conta</button>
            </div>
            <p id="authMessage" class="auth-message"></p>
          </div>
        </div>
      </main>

      <footer>
        <p>Desenvolvido por <strong>Patrick Hauck</strong></p>
        <p>Dados fornecidos pela <a href="https://jikan.moe/" target="_blank">Jikan API</a></p>
        <div class="social-links">
          <a href="https://github.com/patrickhauck0/anime-finder" target="_blank">GitHub</a> | 
          <a href="https://www.linkedin.com/in/patrick-hauck-4672a2200/" target="_blank">LinkedIn</a>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
